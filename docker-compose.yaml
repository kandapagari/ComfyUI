services:
  # An old issue: docker-compose will mount volume as root.
  # Workaround: https://github.com/docker/compose/issues/3270
  # (Command 'docker run -v' is not affected)
  # file-chown:
  #   container_name: file-chown
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   user: "root"
  #   volumes:
  #     - ./models:/code/models
  #   command: "chown -R runner:runner /code"

  web:
    init: true
    container_name: comfyui
    network_mode: "host"
    tty: true
    # depends_on:
    #   file-chown:
    #     condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./models:/code/models
    ports:
      - 8188:8188
    environment:
      - CLI_ARGS=
    security_opt:
      - "label=type:nvidia_container_t"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    entrypoint: ["python", "main.py"]
